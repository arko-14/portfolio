<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>404 - Not Found</title>
    <style>
        /* Login overlay styles */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #login-overlay.hidden {
            display: none;
        }

        .login-box {
            text-align: center;
            padding: 40px;
        }

        .login-box h2 {
            color: #00ff41;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .login-box input {
            background: #111;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px 20px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            width: 250px;
            margin-bottom: 15px;
        }

        .login-box button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .login-error {
            color: #ff4444;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        #main-content {
            display: none;
        }

        #main-content.visible {
            display: block;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #050505;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff41;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .auth-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .auth-section input {
            background: #111;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 15px;
            border-radius: 4px;
            font-family: inherit;
            margin-right: 10px;
            width: 300px;
        }

        .auth-section button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
        }

        .auth-section button:hover {
            background: #00cc33;
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            color: #00ff41;
            font-weight: bold;
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .downloads-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            overflow: hidden;
        }

        .downloads-table th,
        .downloads-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        .downloads-table th {
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            font-weight: normal;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .downloads-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin-left: 10px;
        }

        .refresh-btn:hover {
            background: rgba(0, 255, 65, 0.1);
        }

        @media (max-width: 768px) {
            .downloads-table {
                font-size: 0.85rem;
            }
            
            .auth-section input {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>> Resume Download Analytics</h1>
        <p class="subtitle">Track who's interested in your profile</p>

        <div class="auth-section">
            <input type="password" id="authKey" placeholder="Enter your secret key">
            <button onclick="loadData()">Load Data</button>
            <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
        </div>

        <div id="error-container"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-downloads">--</div>
                <div class="stat-label">Total Downloads</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="unique-countries">--</div>
                <div class="stat-label">Countries</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="today-downloads">--</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="this-week">--</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>

        <div id="data-container">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10,9 9,9 8,9"/>
                </svg>
                <p>Enter your secret key to view download records</p>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            const authKey = document.getElementById('authKey').value;
            const errorContainer = document.getElementById('error-container');
            const dataContainer = document.getElementById('data-container');

            if (!authKey) {
                errorContainer.innerHTML = '<div class="error">Please enter your secret key</div>';
                return;
            }

            errorContainer.innerHTML = '';
            dataContainer.innerHTML = '<div class="loading">Loading data...</div>';

            try {
                const response = await fetch('/api/track-download?key=' + encodeURIComponent(authKey), {
                    headers: {
                        'X-Auth-Key': authKey
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('Invalid secret key');
                    }
                    throw new Error('Failed to load data');
                }

                const data = await response.json();
                displayData(data);
            } catch (error) {
                errorContainer.innerHTML = `<div class="error">${error.message}</div>`;
                dataContainer.innerHTML = '';
            }
        }

        function displayData(data) {
            const records = data.records || [];
            const today = new Date().toDateString();
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);

            // Calculate stats
            const todayDownloads = records.filter(r => new Date(r.serverTimestamp).toDateString() === today).length;
            const weekDownloads = records.filter(r => new Date(r.serverTimestamp) >= weekAgo).length;
            const uniqueCountries = [...new Set(records.map(r => r.country).filter(Boolean))].length;

            // Update stats
            document.getElementById('total-downloads').textContent = data.totalDownloads || 0;
            document.getElementById('unique-countries').textContent = uniqueCountries;
            document.getElementById('today-downloads').textContent = todayDownloads;
            document.getElementById('this-week').textContent = weekDownloads;

            // Display table
            if (records.length === 0) {
                document.getElementById('data-container').innerHTML = `
                    <div class="empty-state">
                        <p>No downloads recorded yet. Share your portfolio!</p>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <table class="downloads-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Location</th>
                            <th>IP</th>
                            <th>Referrer</th>
                            <th>Device</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${records.reverse().map(r => `
                            <tr>
                                <td>${formatDate(r.serverTimestamp)}</td>
                                <td>${r.city || 'Unknown'}, ${r.country || 'Unknown'}</td>
                                <td>${r.ip || r.clientIP || 'Unknown'}</td>
                                <td>${truncate(r.referrer, 30)}</td>
                                <td>${getDevice(r.userAgent)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('data-container').innerHTML = tableHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function truncate(str, length) {
            if (!str) return 'Direct';
            return str.length > length ? str.substring(0, length) + '...' : str;
        }

        function getDevice(userAgent) {
            if (!userAgent) return 'Unknown';
            if (userAgent.includes('iPhone')) return 'iPhone';
            if (userAgent.includes('Android')) return 'Android';
            if (userAgent.includes('iPad')) return 'iPad';
            if (userAgent.includes('Mac')) return 'Mac';
            if (userAgent.includes('Windows')) return 'Windows';
            if (userAgent.includes('Linux')) return 'Linux';
            return 'Other';
        }

        // Allow Enter key to submit
        document.getElementById('authKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadData();
        });
    </script>
</body>
</html>
